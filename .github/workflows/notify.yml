name: notify-gitlab-reviews
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node notify-reviewer.mjs
        env:
          GITLAB_BASE_URL: ${{ secrets.GITLAB_BASE_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
      - run: |
          git config user.name "reviewer-bot"
          git config user.email "reviewer-bot@users.noreply.github.com"
          git add notified-mrs.json
          git diff --staged --quiet || git commit -m "update notified MR state"
          git push
